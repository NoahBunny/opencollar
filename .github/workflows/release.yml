name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write       # Sigstore OIDC token for build provenance
  attestations: write   # write attestations to the GitHub attestations store

jobs:
  android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    env:
      # Hoisted to job-level env because GitHub Actions does not allow
      # `secrets` references inside a step-level `if:` expression.
      RELEASE_KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_B64 }}
      # Single-alias signing — release.keystore is generated with one
      # alias ("focuslock") and reused across all three modules. Each
      # build.sh defaults to a per-app alias if this is unset.
      FOCUSLOCK_KEY_ALIAS: focuslock
    outputs:
      slave: ${{ steps.collect.outputs.slave }}
      companion: ${{ steps.collect.outputs.companion }}
      controller: ${{ steps.collect.outputs.controller }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3
        with:
          packages: "build-tools;35.0.0 platforms;android-36"

      - name: Resolve ANDROID_SDK
        run: echo "ANDROID_SDK=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"

      - name: Restore release keystore (optional)
        if: env.RELEASE_KEYSTORE_B64 != ''
        run: |
          echo "$RELEASE_KEYSTORE_B64" | base64 -d > "$PWD/release.keystore"
          echo "FOCUSLOCK_KEYSTORE=$PWD/release.keystore" >> "$GITHUB_ENV"
          echo "BUILD_FLAG=--release" >> "$GITHUB_ENV"

      - name: Build all three APKs
        env:
          FOCUSLOCK_KEYSTORE_PASS: ${{ secrets.RELEASE_KEYSTORE_PASS }}
        run: |
          # If no release keystore secret is configured, fall back to debug builds
          # (still produces functional APKs — just signed with the debug keystore).
          FLAG="${BUILD_FLAG:-}"
          if [ -n "$FLAG" ]; then
            echo "Building with release keystore"
          else
            echo "WARNING: RELEASE_KEYSTORE_B64 secret not set — falling back to debug signing"
          fi
          for m in slave companion controller; do
            (cd android/$m && bash build.sh $FLAG)
          done

      - name: Collect artifacts
        id: collect
        run: |
          mkdir -p staged
          cp android/slave/*-signed.apk      staged/focuslock-${{ github.ref_name }}.apk
          cp android/companion/*-signed.apk  staged/bunnytasker-${{ github.ref_name }}.apk
          cp android/controller/*-signed.apk staged/focusctl-${{ github.ref_name }}.apk
          ls -la staged/

      - name: Extract signing cert fingerprints
        run: |
          BT="$ANDROID_SDK/build-tools/35.0.0"
          {
            echo "# APK signing certificate SHA-256 fingerprints"
            echo "# Release: ${{ github.ref_name }}"
            echo "# Verify locally with: apksigner verify --print-certs <apk>"
            echo ""
            for apk in staged/*.apk; do
              fp=$("$BT/apksigner" verify --print-certs "$apk" | awk '/SHA-256/ {print $NF; exit}')
              printf '%-60s  %s\n' "$(basename "$apk")" "$fp"
            done
          } > staged/APK-CERTS.txt
          cat staged/APK-CERTS.txt

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-apks
          path: |
            staged/*.apk
            staged/APK-CERTS.txt
          if-no-files-found: error

  windows:
    name: Build Windows EXEs
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set SOURCE_DATE_EPOCH from commit
        shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --pretty=%ct)" >> "$GITHUB_ENV"

      - name: Build (skip signing — users code-sign locally)
        run: python build-win.py --skip-sign

      - name: Stage artifacts with version in name
        shell: bash
        run: |
          mkdir -p staged
          for f in dist/*.exe; do
            base=$(basename "$f" .exe)
            cp "$f" "staged/${base}-${{ github.ref_name }}.exe"
          done
          ls -la staged/

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: windows-exes
          path: staged/*.exe
          if-no-files-found: error

  sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install cyclonedx-bom
        run: pip install cyclonedx-bom

      - name: Generate SBOM from requirements.txt
        run: |
          cyclonedx-py requirements requirements.txt \
            --output-format JSON \
            --output-file SBOM.cdx.json \
            --spec-version 1.5

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: SBOM.cdx.json
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [android, windows, sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts

      - name: Flatten artifact tree
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.apk' -o -name '*.exe' -o -name 'SBOM.cdx.json' -o -name 'APK-CERTS.txt' \) -exec cp {} release/ \;
          ls -la release/

      - name: Generate SHA256SUMS.txt
        working-directory: release
        run: sha256sum * > SHA256SUMS.txt

      - name: Generate Sigstore build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45 # v2
        with:
          subject-path: |
            release/*.apk
            release/*.exe
            release/SBOM.cdx.json
            release/APK-CERTS.txt
            release/SHA256SUMS.txt

      - name: Extract changelog section
        id: changelog
        run: |
          python - <<'PY' > body.md
          import re, os, pathlib
          tag = os.environ["GITHUB_REF_NAME"]
          version = tag.lstrip("v")
          text = pathlib.Path("CHANGELOG.md").read_text()
          # Try to match "## [version]" block; fall back to Unreleased
          patterns = [
              rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|\Z)",
              r"^## \[Unreleased\][^\n]*\n(.*?)(?=^## \[|\Z)",
          ]
          for pat in patterns:
              m = re.search(pat, text, flags=re.MULTILINE | re.DOTALL)
              if m:
                  print(m.group(1).strip())
                  break
          else:
              print(f"Release {tag}")
          PY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          body_path: body.md
          files: |
            release/*.apk
            release/*.exe
            release/SBOM.cdx.json
            release/APK-CERTS.txt
            release/SHA256SUMS.txt
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
